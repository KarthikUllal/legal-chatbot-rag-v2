<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Legal AI Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin-login.css">
</head>

<body class="login-container">
    <div class="min-h-screen flex items-center justify-center px-4 py-12">
        <!-- Login Card -->
        <div class="login-card w-full max-w-md p-8">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="floating mb-4">
                    <div
                        class="bg-gradient-to-br from-blue-600 to-purple-600 text-white w-16 h-16 rounded-2xl flex items-center justify-center mx-auto shadow-lg">
                        <i class="fas fa-shield-alt text-2xl"></i>
                    </div>
                </div>
                <h1 class="text-2xl font-bold text-gray-800 mb-2">Admin Portal</h1>
                <p class="text-gray-600">Legal AI Chatbot Management</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="space-y-6">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-user mr-2 text-blue-600"></i>Username
                    </label>
                    <input type="text" id="username" required placeholder="Enter admin username"
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-lock mr-2 text-blue-600"></i>Password
                    </label>
                    <input type="password" id="password" required placeholder="Enter your password"
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                </div>

                <button type="submit" id="loginBtn"
                    class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-3 rounded-xl hover:from-blue-700 hover:to-purple-700 transition shadow-lg font-medium flex items-center justify-center gap-2">
                    <i class="fas fa-sign-in-alt"></i>
                    Sign In
                </button>
            </form>

            <!-- Error Message -->
            <div id="errorMessage"
                class="hidden mt-4 p-3 bg-red-50 border border-red-200 rounded-xl text-red-700 text-sm text-center">
                <i class="fas fa-exclamation-triangle mr-2"></i>
                <span id="errorText"></span>
            </div>

            <!-- Footer -->
            <div class="mt-8 text-center">
                <p class="text-sm text-gray-500">
                    <i class="fas fa-shield-alt text-blue-600 mr-1"></i>
                    Restricted access. Authorized personnel only.
                </p>
            </div>
        </div>
    </div>

    <script src="js/admin-login.js"></script>
</body>

</html>
